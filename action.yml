name: "JavaScript PNPM Cut Tag"
description: "GitHub Action for cutting versioned tags for JavaScript projects using pnpm"
author: "Jimmie Fulton <jimmie@ybor.ai>"

# Define the inputs for this action
inputs:
  version-level:
    description: "Version level to bump (patch, minor, or major)"
    required: true
    default: "patch"
  project-path:
    description: "Relative path to the project directory containing package.json (must not contain '..' or be absolute)"
    required: false
    default: "."

# Define the outputs for this action
outputs:
  version:
    description: "The new version number"
    value: ${{ steps.version.outputs.version }}
  tag:
    description: "The new tag that was created"
    value: ${{ steps.version.outputs.tag }}

# Define the runs configuration
runs:
  using: "composite"
  steps:
    - name: Check id-token permission
      shell: bash
      run: |
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "::error title=Missing id-token: write permission::js-pnpm-cut-tag requires 'id-token: write' so p6m-release-action can mint a GitHub App token via OIDC. Add the following to your workflow's permissions block:"
          echo ""
          echo "  permissions:"
          echo "    contents: write"
          echo "    id-token: write"
          echo ""
          echo "See: https://github.com/p6m-actions/js-pnpm-cut-tag#required-permissions"
          exit 1
        fi

    - name: Bump Version and Compute Tag
      id: version
      shell: bash
      working-directory: ${{ inputs.project-path }}
      run: |
        # Bump version using pnpm
        echo "Bumping version with level: ${{ inputs.version-level }}"
        pnpm version ${{ inputs.version-level }} --no-git-tag-version

        # Get the new version
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

        # Create tag with v prefix
        TAG="v$NEW_VERSION"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Commit and Tag Release
      uses: p6m-actions/p6m-release-action@v2
      with:
        tags: ${{ steps.version.outputs.tag }}
        commit_message: "[skip ci] Bump version to ${{ steps.version.outputs.version }}"

# Define the branding for the action in the GitHub Marketplace
branding:
  icon: "tag"
  color: "blue"
